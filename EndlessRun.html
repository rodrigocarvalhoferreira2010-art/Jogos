<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Endless Runner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#050510;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
  touch-action:none;
}
#gameWrap{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
}
canvas{
  display:block;
  image-rendering:pixelated;
  border:1px solid rgba(46,204,113,0.15);
  box-shadow:0 0 40px rgba(46,204,113,0.08), 0 0 2px rgba(68,170,255,0.3);
}

/* ── Mobile buttons ───────────────────────── */
#mobileControls{
  display:none;
  gap:20px;
  margin-top:14px;
  user-select:none;
}
#mobileControls.visible{ display:flex; }

.mBtn{
  width:72px;height:72px;
  border-radius:50%;
  border:2px solid rgba(68,170,255,0.5);
  background:rgba(10,30,60,0.85);
  color:#4af;
  font-size:28px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 18px rgba(68,170,255,0.2), inset 0 0 12px rgba(68,170,255,0.05);
  transition:transform .1s, background .1s, box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
  font-family:sans-serif;
}
.mBtn:active, .mBtn.pressed{
  background:rgba(30,80,160,0.9);
  transform:scale(0.92);
  box-shadow:0 0 30px rgba(68,170,255,0.5), inset 0 0 16px rgba(68,170,255,0.15);
}
.mBtn.duck{ border-color:rgba(255,180,50,0.5); color:#fa0; }
.mBtn.duck:active,.mBtn.duck.pressed{
  background:rgba(80,50,10,0.9);
  box-shadow:0 0 30px rgba(255,180,50,0.5);
}

#hint{color:#222;font-size:10px;margin-top:6px;letter-spacing:.08em;text-align:center;}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c"></canvas>
  <div id="mobileControls">
    <button class="mBtn duck" id="btnDuck">↓</button>
    <button class="mBtn" id="btnJump">↑</button>
  </div>
  <div id="hint" id="hintEl"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let isMobile = false; // set in menu

function resizeCanvas(){
  if(isMobile){
    const vw = Math.min(window.innerWidth, 500);
    canvas.width  = vw;
    canvas.height = Math.round(vw * 0.55);
  } else {
    const vw = Math.min(window.innerWidth, 860);
    canvas.width  = Math.max(vw, 600);
    canvas.height = 300;
  }
  W = canvas.width; H = canvas.height;
  groundY = H - Math.round(H * 0.18);
}

let W = 800, H = 300;
let groundY;

// ═══════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════
const BIOMES = [
  { // city night
    sky1:'#050510', sky2:'#0d0d28',
    ground:'#111820', groundLine:'#2ecc71',
    particle:'#4af', accent:'#2ecc71',
    starColor:'rgba(200,220,255,',
    fogColor:'rgba(10,20,50,0.18)',
  },
  { // desert dusk
    sky1:'#1a0a00', sky2:'#3a1a08',
    ground:'#1a1008', groundLine:'#e67e22',
    particle:'#fa8', accent:'#e67e22',
    starColor:'rgba(255,200,150,',
    fogColor:'rgba(40,20,5,0.15)',
  },
  { // alien neon
    sky1:'#010a10', sky2:'#041520',
    ground:'#081a10', groundLine:'#00ffaa',
    particle:'#0fa', accent:'#00ffaa',
    starColor:'rgba(150,255,200,',
    fogColor:'rgba(0,30,15,0.2)',
  },
];
let biomeIdx = 0;
let biomeTimer = 0;
const BIOME_CHANGE = 1800; // frames between biomes

let C_cur = {...BIOMES[0]};
let C_next = {...BIOMES[0]};
let biomeBlend = 1;

function lerpColor(a,b,t){
  // lerp hex-like strings by parsing
  return t >= 1 ? b : t <= 0 ? a : a; // simplified: just snap
}

const C = {
  player:'#4af', playerDark:'#0a3060',
  obstacle:'#e74c3c', obstacleDark:'#7a1010',
  coin:'#ffe066', coinGlow:'rgba(255,224,102,0.18)',
  tunnel:'#0a1a0a', tunnelAccent:'#1a3a1a',
  laserColor:'rgba(255,60,60,',
  ui:'#eee', uiDim:'#444',
  shield:'rgba(68,170,255,0.22)',
  slowmo:'rgba(140,80,255,0.12)',
  dust:'rgba(200,220,255,0.3)',
  magnet:'rgba(255,200,50,0.22)',
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = 'menu'; // menu | playing | dead | modeselect
let score, hiScore = 0, coins, dist;
let speed, speedMult;
let player, obstacles, coinList, particles, powerups;
let frameCount;
let keys = {};
let layers = [];
let stars = [];
let screenShake = 0;
let flashAlpha = 0;
let bgScroll = 0;
let comboCount = 0;
let comboTimer = 0;
let notifQueue = [];

// ═══════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════
function generateStars(){
  stars = [];
  const n = isMobile ? 60 : 120;
  for(let i=0;i<n;i++){
    stars.push({
      x:Math.random()*W,
      y:Math.random()*groundY*0.85,
      r:Math.random()*1.4+0.3,
      twinkle:Math.random()*Math.PI*2,
      speed:0.003+Math.random()*0.008,
      brightness:0.4+Math.random()*0.6,
    });
  }
}

// ═══════════════════════════════════════════════════
//  PARALLAX LAYERS
// ═══════════════════════════════════════════════════
function initLayers(){
  layers = [
    { objs: generateMountains(10, 0.15, 0.5, H*0.25, H*0.65), spd:0.25, type:'mountain', color:'#0c1c2c', alpha:0.7 },
    { objs: generateMountains(7,  0.25, 0.8, H*0.35, H*0.7),  spd:0.55, type:'mountain', color:'#142030', alpha:0.6 },
    { objs: generateBuildings(14),  spd:0.9,  type:'building', alpha:0.5 },
    { objs: generateTrees(10, H*0.5, H*0.7), spd:1.4, type:'tree', color:'#0a1a0a', alpha:0.7 },
    { objs: generateTrees(7,  H*0.55,H*0.75),spd:2.0, type:'tree', color:'#0f2010', alpha:0.8 },
  ];
}

function generateMountains(n, alpha, scaleH, minY, maxY){
  const list=[];
  for(let i=0;i<n;i++){
    const x=(W/n)*i+Math.random()*(W/n);
    const h=(maxY-minY)*scaleH+Math.random()*(maxY-minY)*(1-scaleH);
    list.push({x, h, w:70+Math.random()*100, alpha});
  }
  return list;
}

function generateBuildings(n){
  const list=[];
  for(let i=0;i<n;i++){
    const x=(W/n)*i+Math.random()*(W/n);
    const bh = 30+Math.random()*60;
    const bw = 12+Math.random()*20;
    const windows=[];
    const rows=Math.floor(bh/12);
    const cols=Math.floor(bw/8);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(Math.random()<0.55) windows.push({r,c,on:Math.random()<0.6});
    }
    list.push({x, bh, bw, windows, alpha:0.55});
  }
  return list;
}

function generateTrees(n, minY, maxY){
  const list=[];
  for(let i=0;i<n;i++){
    const x=(W/n)*i+Math.random()*(W/n);
    const h=minY+Math.random()*(maxY-minY);
    list.push({x, h:groundY-h, w:7+Math.random()*9, alpha:1});
  }
  return list;
}

// ═══════════════════════════════════════════════════
//  INIT GAME
// ═══════════════════════════════════════════════════
function initGame(){
  score=0; coins=0; dist=0;
  speed=isMobile?3.5:4.2;
  speedMult=1; frameCount=0;
  biomeIdx=0; biomeTimer=0; biomeBlend=1;
  screenShake=0; flashAlpha=0; comboCount=0; comboTimer=0;
  notifQueue=[];

  player={
    x:isMobile?70:100, y:0,
    w:isMobile?22:28, h:isMobile?36:40,
    vy:0, jumpsLeft:2,
    coyoteTime:0, jumpBuffer:0,
    crouching:false,
    crouchH:isMobile?18:22,
    normalH:isMobile?36:40,
    onGround:false,
    frame:0, frameTick:0,
    shield:0, slowmo:0, magnet:0,
    iframes:0, dead:false, dustTimer:0,
    trail:[],
  };
  player.y = groundY + player.normalH;

  obstacles=[]; coinList=[]; particles=[]; powerups=[];
  obstacleCd = 90;

  initLayers();
  generateStars();
  state='playing';
}

// ═══════════════════════════════════════════════════
//  INPUT – keyboard
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(keys[e.code]) return;
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if((e.code==='Enter'||e.code==='Space')&&state==='menu'){ initGame(); return; }
  if((e.code==='Enter'||e.code==='Space')&&state==='dead'){ state='menu'; return; }
  if(state==='playing'){
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){
      player.jumpBuffer=12; tryJump();
    }
  }
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

// ── Mobile touch buttons ─────────────────────────
const btnJump = document.getElementById('btnJump');
const btnDuck = document.getElementById('btnDuck');

function setupMobileButtons(){
  function bindBtn(btn, downKey, upKey){
    const press = e => { e.preventDefault(); btn.classList.add('pressed'); keys[downKey]=true; if(downKey==='ArrowUp'&&state==='playing'){ player.jumpBuffer=12; tryJump(); } };
    const release = e => { e.preventDefault(); btn.classList.remove('pressed'); keys[downKey]=false; };
    btn.addEventListener('touchstart',press,{passive:false});
    btn.addEventListener('touchend',release,{passive:false});
    btn.addEventListener('touchcancel',release,{passive:false});
    btn.addEventListener('mousedown',press);
    btn.addEventListener('mouseup',release);
    btn.addEventListener('mouseleave',release);
  }
  bindBtn(btnJump,'ArrowUp');
  bindBtn(btnDuck,'ArrowDown');

  // tap on canvas to start
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(state==='menu'){ initGame(); }
    else if(state==='dead'){ state='menu'; }
  },{passive:false});
}

// ═══════════════════════════════════════════════════
//  JUMP
// ═══════════════════════════════════════════════════
function tryJump(){
  const p=player;
  if(p.coyoteTime>0||p.onGround){ doJump(1); }
  else if(p.jumpsLeft>0){ doJump(0.82); }
}
function doJump(force){
  const p=player;
  const spd=p.slowmo>0?0.58:1;
  p.vy=-(13.5*force*spd);
  p.jumpsLeft=Math.max(0,p.jumpsLeft-1);
  p.coyoteTime=0; p.jumpBuffer=0;
  for(let i=0;i<8;i++) addParticle(p.x+p.w/2,p.y,'rgba(68,200,255,0.65)',1.5+Math.random()*2.5,Math.PI/2+Math.random()*0.9-0.45,0.65);
  screenShake=Math.max(screenShake,2);
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
const rand=(a,b)=>Math.random()*(b-a)+a;
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const lerp=(a,b,t)=>a+(b-a)*t;
const randInt=(a,b)=>Math.floor(rand(a,b+1));

function addParticle(x,y,color,spd,angle,life,gravity=0){
  particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life,maxLife:life,r:rand(1.5,3.5),color,gravity});
}

function spawnDust(x,y){
  const bio = BIOMES[biomeIdx];
  for(let i=0;i<3;i++)
    addParticle(x+rand(-8,8),y,C.dust,rand(0.3,1.2),Math.PI+rand(-0.5,0.5),0.45);
}

function pushNotif(text, color='#ffe066'){
  notifQueue.push({text,color,life:1,x:W/2,y:H/2-30});
}

// ═══════════════════════════════════════════════════
//  OBSTACLE GENERATION  ← DUCK ZONES!
// ═══════════════════════════════════════════════════
let obstacleCd=90;

// Obstacle types:
// box       – ground crate, jump over
// spike     – suspended, duck under
// tunnel    – pair of walls with gap, MUST duck to pass
// laser     – horizontal beam at mid height, duck to pass
// doubleBox – two boxes, jump to cross gap
// bat       – flying enemy swoop, duck
// tallBox   – tall crate, must jump high

function spawnObstacle(){
  const bio = BIOMES[biomeIdx];
  const r = Math.random();
  const pnh = player.normalH;
  const pch = player.crouchH;
  const floorY = groundY + pnh;

  if(r < 0.20){
    // Ground box (jump)
    const h=rand(28,50);
    obstacles.push({x:W+20,y:floorY-h,w:24+rand(0,22),h,type:'box',color:C.obstacle});

  } else if(r < 0.38){
    // ★ TUNNEL – must duck!
    const ceilGap = pch + rand(4,10); // ceiling gap exactly fits crouched player
    const wallH = H*0.55;
    const tunnelW = 90+rand(0,60);
    // ceiling bar
    obstacles.push({x:W+20,y:0,w:tunnelW,h:floorY-pnh-ceilGap,type:'tunnel',color:'#0a1a0a',isTunnelTop:true});
    // floor rise (small bump so you can't run through standing)
    obstacles.push({x:W+20,y:floorY-pnh-ceilGap-2,w:tunnelW,h:2,type:'tunnelMarker',color:C.accent||'#2ecc71'});
    // visual side pillars
    obstacles.push({x:W+16,y:0,w:8,h:floorY-pnh-ceilGap+4,type:'tunnelPillar',color:'#142030'});
    obstacles.push({x:W+20+tunnelW,y:0,w:8,h:floorY-pnh-ceilGap+4,type:'tunnelPillar',color:'#142030'});

  } else if(r < 0.54){
    // ★ LASER BEAM – duck to avoid!
    const laserY = floorY - pch - rand(4,12); // just above crouch height
    obstacles.push({x:W+20,y:laserY-3,w:rand(60,100),h:6,type:'laser',color:'#ff3c3c',anim:0});

  } else if(r < 0.67){
    // Suspended spike (top) – duck
    const h=28+rand(0,14);
    obstacles.push({x:W+20,y:5+rand(0,16),w:18+rand(0,14),h,type:'spike',color:'#9b59b6'});

  } else if(r < 0.78){
    // ★ HANGING SPIKE LOW – exactly needs duck
    const h=pnh - pch - rand(2,8);
    obstacles.push({x:W+20,y:floorY-pnh,w:20+rand(0,12),h,type:'spike',color:'#c0392b'});

  } else if(r < 0.88){
    // Double box (jump across gap)
    const h1=rand(30,46), h2=rand(26,44);
    obstacles.push({x:W+20, y:floorY-h1, w:20, h:h1, type:'box',color:C.obstacle});
    obstacles.push({x:W+80, y:floorY-h2, w:20, h:h2, type:'box',color:'#c0392b'});

  } else {
    // ★ BAT SWOOP – duck to avoid!
    const batY = floorY - pnh + pch - rand(0,8); // right at crouch head height
    obstacles.push({x:W+20,y:batY-14,w:26,h:14,type:'bat',color:'#8e44ad',anim:0});
  }
}

// ═══════════════════════════════════════════════════
//  COINS & POWERUPS
// ═══════════════════════════════════════════════════
function spawnCoin(){
  const floorY = groundY + player.normalH;
  const baseY = floorY - rand(20, 80);
  const n = randInt(3,7);
  // sometimes spawn in arc pattern
  const arc = Math.random()<0.4;
  for(let i=0;i<n;i++){
    const dy = arc ? -Math.sin((i/(n-1))*Math.PI)*35 : 0;
    coinList.push({x:W+20+i*30, y:baseY+dy, r:7, collected:false, anim:rand(0,Math.PI*2)});
  }
}

function spawnPowerup(){
  const tipo = (['shield','slowmo','magnet'])[randInt(0,2)];
  const floorY = groundY + player.normalH;
  powerups.push({x:W+20, y:floorY-60-rand(0,40), r:11, tipo, anim:0});
}

// ═══════════════════════════════════════════════════
//  AABB
// ═══════════════════════════════════════════════════
function aabb(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
function update(){
  if(state!=='playing') return;

  frameCount++;
  dist += speed;
  score = Math.floor(dist/10);

  // Biome transition
  biomeTimer++;
  if(biomeTimer >= BIOME_CHANGE){
    biomeTimer=0;
    biomeIdx=(biomeIdx+1)%BIOMES.length;
  }

  // Speed curve
  speedMult = 1 + Math.min(frameCount/3200, 1.4);
  const curSpd = speed * speedMult * (player.slowmo>0?0.42:1);

  const p=player;

  // Crouch
  p.crouching = !!(keys['ArrowDown']||keys['KeyS']);
  p.h = p.crouching ? p.crouchH : p.normalH;

  // Gravity
  const gravity = p.slowmo>0 ? 0.32 : 0.62;
  const falling = p.vy>0 && !(keys['Space']||keys['ArrowUp']||keys['KeyW']);
  p.vy += gravity*(falling?1.9:1);
  p.y  += p.vy;

  // Floor
  const floorY = groundY + p.normalH;
  if(p.y >= floorY){
    p.y = floorY;
    if(p.vy>3) spawnDust(p.x+p.w/2,p.y);
    p.vy=0; p.onGround=true; p.jumpsLeft=2; p.coyoteTime=8;
    if(p.jumpBuffer>0) tryJump();
  } else {
    p.onGround=false;
    if(p.coyoteTime>0) p.coyoteTime--;
  }
  if(p.jumpBuffer>0) p.jumpBuffer--;

  // Timers
  if(p.iframes>0) p.iframes--;
  if(p.shield>0)  p.shield--;
  if(p.slowmo>0)  p.slowmo--;
  if(p.magnet>0)  p.magnet--;
  if(comboTimer>0) comboTimer--;
  else if(comboCount>0){ comboCount=0; }

  // Animation
  if(p.onGround){ p.frameTick++; if(p.frameTick>8){p.frameTick=0;p.frame=(p.frame+1)%4;} }
  else p.frame=1;
  if(p.onGround){ p.dustTimer++; if(p.dustTimer>12){p.dustTimer=0;spawnDust(p.x+4,p.y);} }

  // Player trail (slowmo)
  if(p.slowmo>0){
    p.trail.push({x:p.x,y:p.y-p.h,w:p.w,h:p.h,a:0.25});
    if(p.trail.length>7) p.trail.shift();
    p.trail.forEach(t=>t.a*=0.88);
  } else { p.trail=[]; }

  // Screen shake decay
  if(screenShake>0) screenShake*=0.82;

  // Flash decay
  if(flashAlpha>0) flashAlpha*=0.88;

  // Parallax
  layers.forEach(l=>{
    l.objs.forEach(o=>{ o.x-=l.spd*curSpd/speed; if(o.x+(o.bw||o.w||50)<-30) o.x+=W+120; });
  });

  // Stars drift
  stars.forEach(s=>{ s.twinkle+=s.speed; s.x-=0.12*curSpd/speed; if(s.x<0) s.x+=W; });

  // Obstacles
  obstacleCd -= curSpd/speed;
  if(obstacleCd<=0){
    spawnObstacle();
    obstacleCd = rand(60,140)/speedMult;
  }
  obstacles.forEach(o=>{ o.x-=curSpd; if(o.anim!==undefined) o.anim+=0.1; });
  obstacles = obstacles.filter(o=>o.x>-120);

  // Coins
  if(frameCount%80===0) spawnCoin();
  coinList.forEach(c=>{ c.x-=curSpd; c.anim+=0.09; });
  // magnet
  if(p.magnet>0){
    coinList.forEach(c=>{
      if(c.collected) return;
      const dx=p.x+p.w/2-c.x, dy=p.y-p.h/2-c.y;
      const dist2=Math.sqrt(dx*dx+dy*dy);
      if(dist2<120){ c.x+=dx*0.12; c.y+=dy*0.12; }
    });
  }
  coinList = coinList.filter(c=>!c.collected&&c.x>-20);

  // Power-ups
  if(frameCount%360===0&&Math.random()<0.5) spawnPowerup();
  powerups.forEach(pu=>{ pu.x-=curSpd; pu.anim+=0.06; });
  powerups = powerups.filter(pu=>pu.x>-30);

  // Notifications
  notifQueue.forEach(n=>{ n.life-=0.025; n.y-=0.5; });
  notifQueue = notifQueue.filter(n=>n.life>0);

  // ── COLLISION ──
  const hitbox = getHitbox(p);

  // Obstacles
  if(p.iframes===0){
    obstacles.forEach(o=>{
      if(o.type==='tunnelMarker'||o.type==='tunnelPillar') return;
      if(aabb(hitbox.x,hitbox.y,hitbox.w,hitbox.h, o.x,o.y,o.w,o.h)){
        onHit(p);
      }
    });
  }

  // Coins
  coinList.forEach(c=>{
    if(aabb(hitbox.x,hitbox.y,hitbox.w,hitbox.h, c.x-c.r,c.y-c.r,c.r*2,c.r*2)){
      c.collected=true; coins++;
      score+=5;
      comboCount++; comboTimer=90;
      if(comboCount>=3) pushNotif(`COMBO ×${comboCount}!`, '#ffe066');
      for(let i=0;i<8;i++) addParticle(c.x,c.y,C.coin,rand(1,3.5),rand(0,Math.PI*2),0.65);
    }
  });

  // Power-ups
  powerups.forEach(pu=>{
    if(aabb(hitbox.x,hitbox.y,hitbox.w,hitbox.h, pu.x-pu.r,pu.y-pu.r,pu.r*2,pu.r*2)){
      pu.collected=true;
      if(pu.tipo==='shield'){   p.shield=300; pushNotif('ESCUDO!','#4af'); }
      else if(pu.tipo==='slowmo'){ p.slowmo=240; pushNotif('SLOW-MO!','#c3f'); }
      else {                    p.magnet=300; pushNotif('IMÁN!','#fa0'); }
      for(let i=0;i<14;i++) addParticle(pu.x,pu.y,pu.tipo==='shield'?'#4af':pu.tipo==='slowmo'?'#c3f':'#fa0',rand(1.5,4.5),rand(0,Math.PI*2),0.9);
      screenShake=4;
    }
  });
  powerups=powerups.filter(pu=>!pu.collected&&pu.x>-30);

  // Particles
  particles=particles.filter(pt=>{
    pt.x+=pt.vx; pt.y+=pt.vy;
    pt.vx*=0.92; pt.vy=pt.vy*0.92+(pt.gravity||0);
    pt.life-=0.03;
    return pt.life>0;
  });
}

function getHitbox(p){
  const pw=p.w*0.68, ph=p.h*0.82;
  return {x:p.x+(p.w-pw)/2, y:p.y-p.h+(p.h-ph)*0.08, w:pw, h:ph};
}

function onHit(p){
  if(p.shield>0){
    p.shield=0; p.iframes=90;
    flashAlpha=0.5;
    screenShake=8;
    for(let i=0;i<18;i++) addParticle(p.x+p.w/2,p.y-p.h/2,'#4af',rand(1.5,5),rand(0,Math.PI*2),0.8);
    pushNotif('ESCUDO QUEBRADO','#4af');
  } else {
    state='dead';
    flashAlpha=0.8;
    screenShake=12;
    for(let i=0;i<24;i++) addParticle(p.x+p.w/2,p.y-p.h/2,C.obstacle,rand(1,6),rand(0,Math.PI*2),1.1,0.05);
    if(score>hiScore) hiScore=score;
  }
}

// ═══════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════
function draw(){
  ctx.save();

  // Screen shake
  if(screenShake>0.5){
    ctx.translate(rand(-screenShake,screenShake),rand(-screenShake*0.5,screenShake*0.5));
  }

  const bio = BIOMES[biomeIdx];

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,bio.sky1);
  sky.addColorStop(1,bio.sky2);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(state==='menu'){ ctx.restore(); drawMenu(); return; }
  if(state==='modeselect'){ ctx.restore(); drawModeSelect(); return; }

  // Stars
  drawStars(bio);

  // Fog/gradient over horizon
  const fog=ctx.createLinearGradient(0,groundY-30,0,groundY+player.normalH+20);
  fog.addColorStop(0,'transparent');
  fog.addColorStop(1,bio.fogColor||'rgba(0,0,0,0.2)');
  ctx.fillStyle=fog; ctx.fillRect(0,groundY-30,W,60);

  // Slowmo overlay
  if(player.slowmo>0){ ctx.fillStyle=C.slowmo; ctx.fillRect(0,0,W,H); }

  // Parallax layers
  drawLayers(bio);

  // Ground
  const floorY = groundY + player.normalH;
  ctx.fillStyle=bio.ground||'#111820';
  ctx.fillRect(0,floorY,W,H-floorY);

  // Ground glow line
  const glow=ctx.createLinearGradient(0,floorY-4,0,floorY+8);
  glow.addColorStop(0,bio.groundLine);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.fillRect(0,floorY-2,W,10);

  // Ground grid lines
  ctx.strokeStyle=bio.groundLine+'28'; ctx.lineWidth=1;
  const lineOff=(frameCount*speed*speedMult)%60;
  for(let x=0;x<W+60;x+=60){
    const lx=x-lineOff;
    ctx.beginPath(); ctx.moveTo(lx,floorY+8); ctx.lineTo(lx+30,floorY+8); ctx.stroke();
  }

  // Particles (behind player)
  drawParticles();

  // Coins
  drawCoins();

  // Power-ups
  drawPowerups();

  // Obstacles
  drawObstacles(bio);

  // Player trail
  player.trail.forEach(t=>{
    ctx.globalAlpha=t.a;
    ctx.fillStyle=C.player;
    ctx.fillRect(t.x,t.y,t.w,t.h);
  });
  ctx.globalAlpha=1;

  // Player
  drawPlayer();

  // HUD
  drawHUD(bio);

  // Notifications
  drawNotifs();

  // Flash
  if(flashAlpha>0.01){
    ctx.fillStyle=`rgba(255,60,60,${flashAlpha.toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
  }

  if(state==='dead'){ drawDead(); }

  ctx.restore();
}

function drawStars(bio){
  const col=bio.starColor||'rgba(200,220,255,';
  stars.forEach(s=>{
    const twinkle=0.5+0.5*Math.sin(s.twinkle);
    ctx.globalAlpha=s.brightness*twinkle*0.8;
    ctx.fillStyle=col+(0.9)+')';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawLayers(bio){
  layers.forEach((l,li)=>{
    l.objs.forEach(o=>{
      ctx.globalAlpha=o.alpha;
      if(l.type==='mountain'){
        ctx.fillStyle=l.color||'#0c1c2c';
        ctx.beginPath();
        ctx.moveTo(o.x,groundY+player.normalH);
        ctx.lineTo(o.x+o.w/2,groundY+player.normalH-o.h);
        ctx.lineTo(o.x+o.w,groundY+player.normalH);
        ctx.closePath(); ctx.fill();
      } else if(l.type==='building'){
        const bh=o.bh, bw=o.bw;
        const by=groundY+player.normalH-bh;
        ctx.fillStyle='#0e1622';
        ctx.fillRect(o.x,by,bw,bh);
        // windows
        o.windows.forEach(win=>{
          if(!win.on) return;
          ctx.fillStyle=`rgba(255,230,80,${0.15+Math.sin(frameCount*0.02+win.r*0.7)*0.05})`;
          ctx.fillRect(o.x+4+win.c*8,by+6+win.r*12,5,7);
        });
      } else if(l.type==='tree'){
        const col=l.color||'#0a1a0a';
        ctx.fillStyle=col;
        ctx.fillRect(o.x,o.h,o.w,groundY+player.normalH-o.h);
        ctx.beginPath();
        ctx.moveTo(o.x-o.w*0.6,o.h);
        ctx.lineTo(o.x+o.w/2,o.h-o.w*1.5);
        ctx.lineTo(o.x+o.w+o.w*0.6,o.h);
        ctx.closePath(); ctx.fill();
      }
    });
  });
  ctx.globalAlpha=1;
}

function drawParticles(){
  particles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawCoins(){
  coinList.forEach(c=>{
    if(c.collected) return;
    const pulse=1+Math.sin(c.anim)*0.14;
    // glow
    ctx.globalAlpha=0.35*pulse;
    ctx.fillStyle=C.coinGlow;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r*2.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // coin body
    ctx.fillStyle=C.coin;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r*pulse,0,Math.PI*2); ctx.fill();
    // shine
    ctx.fillStyle='rgba(255,255,200,0.55)';
    ctx.beginPath(); ctx.arc(c.x-2,c.y-2,c.r*0.32,0,Math.PI*2); ctx.fill();
  });
}

function drawPowerups(){
  powerups.forEach(pu=>{
    const col=pu.tipo==='shield'?'#4af':pu.tipo==='slowmo'?'#c3f':'#fa0';
    const pulse=1+Math.sin(pu.anim)*0.2;
    ctx.globalAlpha=0.3;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*2.8*pulse,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*pulse,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`bold ${isMobile?9:11}px Share Tech Mono`; ctx.textAlign='center';
    const lbl = pu.tipo==='shield'?'S':pu.tipo==='slowmo'?'M':'★';
    ctx.fillText(lbl,pu.x,pu.y+4);
  });
}

function drawObstacles(bio){
  obstacles.forEach(o=>{
    if(o.type==='box'){
      // gradient face
      const grad=ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
      grad.addColorStop(0,'#e74c3c'); grad.addColorStop(1,'#7a1010');
      ctx.fillStyle=grad; ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(o.x,o.y,o.w,5); // top shade
      ctx.fillRect(o.x,o.y,3,o.h); // left shade
      // cross mark
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(o.x+o.w*0.3,o.y+4); ctx.lineTo(o.x+o.w*0.3,o.y+o.h-4); ctx.stroke();

    } else if(o.type==='spike'){
      ctx.fillStyle=o.color;
      ctx.beginPath();
      ctx.moveTo(o.x,o.y); ctx.lineTo(o.x+o.w/2,o.y+o.h); ctx.lineTo(o.x+o.w,o.y);
      ctx.closePath(); ctx.fill();
      // glow
      ctx.globalAlpha=0.25+0.15*Math.sin((o.anim||0)*2);
      ctx.fillStyle=o.color;
      ctx.beginPath();
      ctx.moveTo(o.x-5,o.y); ctx.lineTo(o.x+o.w/2,o.y+o.h+8); ctx.lineTo(o.x+o.w+5,o.y);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha=1;

    } else if(o.type==='tunnel'){
      // ceiling block – dark with warning stripes
      ctx.fillStyle='#0a1a10';
      ctx.fillRect(o.x,o.y,o.w,o.h);
      // warning stripes
      ctx.save();
      ctx.rect(o.x,o.y,o.w,o.h); ctx.clip();
      ctx.strokeStyle='rgba(46,204,113,0.25)'; ctx.lineWidth=5;
      for(let sx=-o.h;sx<o.w+o.h;sx+=18){
        ctx.beginPath(); ctx.moveTo(o.x+sx,o.y+o.h); ctx.lineTo(o.x+sx+o.h,o.y); ctx.stroke();
      }
      ctx.restore();
      // bottom glow edge
      ctx.fillStyle='rgba(46,204,113,0.4)';
      ctx.fillRect(o.x,o.y+o.h-2,o.w,3);

    } else if(o.type==='tunnelPillar'){
      ctx.fillStyle=o.color;
      ctx.fillRect(o.x,o.y,o.w,o.h);

    } else if(o.type==='tunnelMarker'){
      // thin glow line showing passage height
      ctx.fillStyle='rgba(46,204,113,0.6)';
      ctx.fillRect(o.x,o.y,o.w,o.h);

    } else if(o.type==='laser'){
      const a = o.anim||0;
      const flicker=0.7+0.3*Math.sin(a*8);
      // beam glow
      ctx.globalAlpha=0.18*flicker;
      ctx.fillStyle='#ff3c3c';
      ctx.fillRect(o.x-4,o.y-8,o.w+8,o.h+16);
      ctx.globalAlpha=flicker;
      // core beam
      const lg=ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
      lg.addColorStop(0,'rgba(255,80,80,0.9)');
      lg.addColorStop(0.5,'rgba(255,20,20,1)');
      lg.addColorStop(1,'rgba(255,80,80,0.9)');
      ctx.fillStyle=lg; ctx.fillRect(o.x,o.y,o.w,o.h);
      // emitter nodes
      ctx.fillStyle='#ff9999'; ctx.globalAlpha=flicker;
      ctx.beginPath(); ctx.arc(o.x,o.y+o.h/2,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.x+o.w,o.y+o.h/2,5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // warning label
      ctx.fillStyle=`rgba(255,80,80,${0.7*flicker})`;
      ctx.font=`bold ${isMobile?7:9}px Share Tech Mono`; ctx.textAlign='center';
      ctx.fillText('⚡LASER',o.x+o.w/2,o.y-4);

    } else if(o.type==='bat'){
      const a=o.anim||0;
      const flapY=Math.sin(a*6)*4;
      ctx.fillStyle=o.color;
      // body
      ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+8+flapY,5,6,0,0,Math.PI*2); ctx.fill();
      // wings
      ctx.beginPath();
      ctx.moveTo(o.x+o.w/2,o.y+8+flapY);
      ctx.quadraticCurveTo(o.x-4,o.y+flapY,o.x,o.y+14+flapY);
      ctx.quadraticCurveTo(o.x+4,o.y+10+flapY,o.x+o.w/2,o.y+8+flapY);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(o.x+o.w/2,o.y+8+flapY);
      ctx.quadraticCurveTo(o.x+o.w+4,o.y+flapY,o.x+o.w,o.y+14+flapY);
      ctx.quadraticCurveTo(o.x+o.w-4,o.y+10+flapY,o.x+o.w/2,o.y+8+flapY);
      ctx.fill();
      // eyes glow
      ctx.fillStyle='rgba(255,50,50,0.85)';
      ctx.beginPath(); ctx.arc(o.x+o.w/2-2,o.y+6+flapY,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.x+o.w/2+2,o.y+6+flapY,1.5,0,Math.PI*2); ctx.fill();
    }
  });
}

function drawPlayer(){
  const p=player;
  const py=p.y-p.h;
  const flicker=p.iframes>0&&Math.floor(p.iframes/5)%2===0;
  if(flicker) return;

  ctx.save(); ctx.translate(p.x,py);

  // Magnet aura
  if(p.magnet>0){
    ctx.strokeStyle=`rgba(255,200,50,${0.3+0.2*Math.sin(frameCount*0.1)})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.w/2,p.h/2,p.w*1.0,0,Math.PI*2); ctx.stroke();
  }

  // Shield
  if(p.shield>0){
    ctx.strokeStyle=`rgba(68,170,255,${0.5+0.2*Math.sin(frameCount*0.08)})`; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(p.w/2,p.h/2,p.w*0.85,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.12+0.06*Math.sin(frameCount*0.08);
    ctx.fillStyle='#4af';
    ctx.beginPath(); ctx.arc(p.w/2,p.h/2,p.w*0.85,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(p.w/2,p.h+2,p.w*0.42,4,0,0,Math.PI*2); ctx.fill();

  if(p.crouching){
    ctx.fillStyle=C.playerDark;
    ctx.fillRect(2,p.h-p.crouchH,p.w-4,p.crouchH);
    ctx.fillStyle=C.player;
    ctx.fillRect(4,p.h-p.crouchH+2,p.w-8,p.crouchH-4);
    ctx.fillStyle='#fff';
    ctx.fillRect(p.w-10,p.h-p.crouchH+6,8,6);
    ctx.fillStyle='#001833';
    ctx.fillRect(p.w-7,p.h-p.crouchH+8,4,3);
    // visor glow
    ctx.fillStyle='rgba(68,200,255,0.35)';
    ctx.fillRect(p.w-10,p.h-p.crouchH+6,8,6);
  } else {
    const legOff=p.onGround?Math.sin(p.frame*Math.PI/2)*7:0;
    ctx.fillStyle=C.playerDark;
    ctx.fillRect(4,p.h-14,8,14+legOff);
    ctx.fillRect(p.w-12,p.h-14,8,14-legOff);
    // feet
    ctx.fillStyle='#0a2040';
    ctx.fillRect(2,p.h-4,10,4);
    ctx.fillRect(p.w-12,p.h-4,10,4);

    ctx.fillStyle=C.playerDark;
    ctx.fillRect(0,6,p.w,p.h-18);
    ctx.fillStyle=C.player;
    ctx.fillRect(2,8,p.w-4,p.h-22);
    // chest line
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(2,p.h-18); ctx.lineTo(p.w-2,p.h-18); ctx.stroke();

    ctx.fillStyle=C.playerDark;
    ctx.fillRect(2,0,p.w-4,16);
    ctx.fillStyle=C.player;
    ctx.fillRect(4,2,p.w-8,12);

    ctx.fillStyle='#fff';
    ctx.fillRect(p.w-9,4,7,6);
    ctx.fillStyle='#001833';
    ctx.fillRect(p.w-7,5,4,4);
    ctx.fillStyle='rgba(68,200,255,0.45)';
    ctx.fillRect(p.w-9,4,7,6);

    const armOff=p.onGround?-Math.sin(p.frame*Math.PI/2)*5:4;
    ctx.fillStyle=C.playerDark;
    ctx.fillRect(-4,10+armOff,6,10);
  }
  ctx.restore();
}

function drawHUD(bio){
  const accent = bio.groundLine||'#2ecc71';
  // Score
  ctx.fillStyle=C.ui; ctx.font=`bold ${isMobile?13:16}px Orbitron`; ctx.textAlign='left';
  ctx.fillText(`${score}`,16,isMobile?22:28);
  ctx.fillStyle=C.uiDim; ctx.font=`${isMobile?9:11}px Share Tech Mono`;
  ctx.fillText(`RECORDE ${hiScore}`,16,isMobile?34:44);

  // Coins
  ctx.fillStyle=C.coin; ctx.font=`bold ${isMobile?12:14}px Share Tech Mono`; ctx.textAlign='right';
  ctx.fillText(`● ${coins}`,W-16,isMobile?22:28);

  // Speed bar
  const pct=Math.min((speedMult-1)/1.4,1);
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(W/2-50,isMobile?6:8,100,isMobile?4:6);
  ctx.fillStyle=`rgba(${Math.floor(lerp(46,231,pct))},${Math.floor(lerp(204,76,pct))},${Math.floor(lerp(113,60,pct))},0.85)`;
  ctx.fillRect(W/2-50,isMobile?6:8,100*pct,isMobile?4:6);

  // Active power-ups
  let hudY = H - (isMobile?10:14);
  ctx.font=`${isMobile?9:11}px Share Tech Mono`; ctx.textAlign='center';
  if(player.shield>0){
    ctx.fillStyle='rgba(68,170,255,0.85)';
    ctx.fillText(`ESCUDO ${Math.ceil(player.shield/60)}s`,W/2,hudY);
    hudY -= isMobile?14:18;
  }
  if(player.slowmo>0){
    ctx.fillStyle='rgba(180,100,255,0.85)';
    ctx.fillText(`SLOW-MO ${Math.ceil(player.slowmo/60)}s`,W/2,hudY);
    hudY -= isMobile?14:18;
  }
  if(player.magnet>0){
    ctx.fillStyle='rgba(255,200,50,0.85)';
    ctx.fillText(`IMÁN ${Math.ceil(player.magnet/60)}s`,W/2,hudY);
  }

  // Combo
  if(comboCount>=3 && comboTimer>0){
    ctx.fillStyle=`rgba(255,224,102,${comboTimer/90})`;
    ctx.font=`bold ${isMobile?12:15}px Orbitron`; ctx.textAlign='right';
    ctx.fillText(`×${comboCount}`,W-16,isMobile?40:48);
  }

  // Milestones
  const milestones=[100,500,1000,2000,5000,10000];
  milestones.forEach(m=>{
    if(score>=m&&score<m+20){
      const a=(1-(score-m)/20);
      ctx.fillStyle=`rgba(255,224,102,${a})`;
      ctx.font=`bold ${isMobile?18:22}px Orbitron`; ctx.textAlign='center';
      ctx.fillText(`${m}!`,W/2,H/2-30);
    }
  });
}

function drawNotifs(){
  notifQueue.forEach(n=>{
    ctx.fillStyle=n.color;
    ctx.globalAlpha=n.life;
    ctx.font=`bold ${isMobile?13:16}px Orbitron`; ctx.textAlign='center';
    ctx.fillText(n.text,n.x,n.y);
  });
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════
//  MENUS
// ═══════════════════════════════════════════════════
function drawModeSelect(){
  ctx.save();
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050510'); sky.addColorStop(1,'#0d0d28');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Stars
  drawStars(BIOMES[0]);

  ctx.textAlign='center';
  ctx.fillStyle='#2ecc71'; ctx.font=`bold ${isMobile?20:28}px Orbitron`;
  ctx.fillText('MODO DE JOGO',W/2,H*0.22);

  const btnW=isMobile?130:160, btnH=isMobile?56:68;
  const gap=isMobile?18:28;
  const cx=W/2;
  const cy=H/2;

  // PC button
  drawMenuBtn(cx-btnW/2-gap/2-btnW/2, cy-btnH/2, btnW, btnH, '🖥 PC', '#4af', ()=>{ isMobile=false; finishModeSelect(); });
  // Mobile button
  drawMenuBtn(cx+gap/2, cy-btnH/2, btnW, btnH, '📱 MOBILE', '#2ecc71', ()=>{ isMobile=true; finishModeSelect(); });

  ctx.fillStyle='#333'; ctx.font=`${isMobile?9:11}px Share Tech Mono`;
  ctx.fillText('PC usa teclado  ·  Mobile usa botões no ecrã',W/2,cy+btnH/2+24);

  if(hiScore>0){
    ctx.fillStyle='#222'; ctx.font=`${isMobile?9:11}px Share Tech Mono`;
    ctx.fillText(`RECORDE  ${hiScore}`,W/2,cy+btnH/2+42);
  }
  ctx.restore();
}

// Store button hit areas for clicks
let menuButtons = [];

function drawMenuBtn(x, y, w, h, label, color, cb){
  menuButtons.push({x,y,w,h,cb});
  const hover = false; // simplified
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=color; ctx.lineWidth=1.5;
  ctx.strokeRect(x,y,w,h);
  ctx.fillStyle=color; ctx.font=`bold ${isMobile?14:18}px Orbitron`;
  ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+6);
}

function finishModeSelect(){
  resizeCanvas();
  initLayers();
  generateStars();
  document.getElementById('mobileControls').classList.toggle('visible', isMobile);
  const hint = document.getElementById('hint');
  hint.textContent = isMobile
    ? 'Toca ↑ para saltar  ·  Toca ↓ para agachar'
    : 'ESPAÇO/↑ saltar  ·  ↓ agachar  ·  ENTER iniciar';
  state = 'menu';
}

function drawMenu(){
  ctx.save();
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050510'); sky.addColorStop(1,'#0d0d28');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(stars.length===0) generateStars();
  drawStars(BIOMES[0]);

  ctx.textAlign='center';
  ctx.fillStyle='#2ecc71'; ctx.font=`bold ${isMobile?26:36}px Orbitron`;
  ctx.fillText('ENDLESS',W/2,H/2-(isMobile?55:60));
  ctx.fillStyle='#4af'; ctx.font=`bold ${isMobile?26:36}px Orbitron`;
  ctx.fillText('RUNNER',W/2,H/2-(isMobile?22:22));

  // controls hint
  ctx.fillStyle='#333'; ctx.font=`${isMobile?9:11}px Share Tech Mono`;
  if(isMobile){
    ctx.fillText('↑ saltar  ·  ↓ agachar  ·  duplo salto',W/2,H/2+14);
    ctx.fillText('AGACHA para túneis, lasers e morcegos!',W/2,H/2+28);
  } else {
    ctx.fillText('ESPAÇO/↑ saltar  ·  ↓ agachar  ·  duplo salto',W/2,H/2+14);
    ctx.fillText('AGACHA para túneis, lasers e morcegos!',W/2,H/2+28);
  }

  const blink=Math.floor(Date.now()/500)%2===0;
  ctx.fillStyle=blink?'#ffe066':'#5a4800';
  ctx.font=`bold ${isMobile?12:14}px Share Tech Mono`;
  ctx.fillText(isMobile?'[ TOCA ] INICIAR':'[ ENTER ] INICIAR',W/2,H/2+(isMobile?56:62));

  // mode change button
  ctx.strokeStyle='rgba(100,100,100,0.4)'; ctx.lineWidth=1;
  const mbtnW=isMobile?110:130, mbtnH=isMobile?22:26;
  ctx.strokeRect(W/2-mbtnW/2,H/2+(isMobile?72:80),mbtnW,mbtnH);
  ctx.fillStyle='#333'; ctx.font=`${isMobile?9:10}px Share Tech Mono`;
  ctx.fillText(`MODO: ${isMobile?'MOBILE':'PC'} ↺ mudar`,W/2,H/2+(isMobile?87:97));
  menuButtons=[{x:W/2-mbtnW/2,y:H/2+(isMobile?72:80),w:mbtnW,h:mbtnH,cb:()=>{state='modeselect';menuButtons=[];}}];

  if(hiScore>0){
    ctx.fillStyle='#222'; ctx.font=`${isMobile?9:11}px Share Tech Mono`;
    ctx.fillText(`RECORDE  ${hiScore}`,W/2,H-16);
  }
  ctx.restore();
}

function drawDead(){
  ctx.save();
  ctx.fillStyle='rgba(5,5,16,0.8)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  ctx.fillStyle='#e74c3c'; ctx.font=`bold ${isMobile?26:34}px Orbitron`;
  ctx.fillText('GAME OVER',W/2,H/2-(isMobile?42:50));

  ctx.fillStyle='#ddd'; ctx.font=`${isMobile?11:14}px Share Tech Mono`;
  ctx.fillText(`SCORE: ${score}   MOEDAS: ${coins}`,W/2,H/2-(isMobile?16:12));
  ctx.fillStyle='#555'; ctx.font=`${isMobile?9:12}px Share Tech Mono`;
  ctx.fillText(`RECORDE: ${hiScore}`,W/2,H/2+(isMobile?6:8));

  const blink=Math.floor(Date.now()/500)%2===0;
  ctx.fillStyle=blink?'#ffe066':'#5a4800';
  ctx.font=`bold ${isMobile?11:13}px Share Tech Mono`;
  ctx.fillText(isMobile?'[ TOCA ] TENTAR NOVAMENTE':'[ ENTER ] TENTAR NOVAMENTE',W/2,H/2+(isMobile?44:52));
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  CLICK / TAP on menus
// ═══════════════════════════════════════════════════
function handleMenuClick(cx, cy){
  menuButtons.forEach(btn=>{
    if(cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){
      btn.cb();
    }
  });
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width, sy=canvas.height/r.height;
  const cx=(e.clientX-r.left)*sx, cy=(e.clientY-r.top)*sy;
  if(state==='modeselect'||state==='menu') handleMenuClick(cx,cy);
  if(state==='menu'&&!menuButtons.some(b=>cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h)){
    if(isMobile||true) initGame();
  }
  if(state==='dead'){ state='menu'; }
});

canvas.addEventListener('touchend',e=>{
  if(state==='dead'){ state='menu'; return; }
  const r=canvas.getBoundingClientRect();
  const t=e.changedTouches[0];
  const sx=canvas.width/r.width, sy=canvas.height/r.height;
  const cx=(t.clientX-r.left)*sx, cy=(t.clientY-r.top)*sy;
  if(state==='modeselect'||state==='menu') handleMenuClick(cx,cy);
},{passive:true});

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Boot ─────────────────────────────────────────
resizeCanvas();
generateStars();
state='modeselect';
setupMobileButtons();
loop();
</script>
</body>
</html>
